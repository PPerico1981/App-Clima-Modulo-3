<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>App del Clima</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />

        <link rel="stylesheet" href="./css/style.css" />
    </head>

    <body>
        <!--Cabecera-->
        <header>
            <div class="bg-primary text-white text-center p-4">
                <h1>🌦️ App del Clima</h1>
                <p>Revisa el clima de tu ciudad</p>
            </div>
            
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="./index.html">Chile</a>
                    <button
                        class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarNavDropdown"
                        aria-controls="navbarNavDropdown"
                        aria-expanded="false"
                        aria-label="Toggle navigation"
                    >
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div
                        class="collapse navbar-collapse"
                        id="navbarNavDropdown"
                    >
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" href="#">Noticias y Blog</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Quienes somos</a>
                            </li>
                            <li class="nav-item dropdown">
                                <ul class="dropdown-menu" id="countryDropdown">
                                    <li>
                                        <a
                                            class="dropdown-item"
                                            href="#"
                                            data-country="chile"
                                            >Chile</a
                                        >
                                    </li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <!--Fin cabecera-->
        <!--contenido principal-->

        <!-- Contenedor de tarjetas -->
        <main>
            <div class="container my-4">
                <div id="cards-container" class="row"></div>
            </div>
        </main>

        <footer class="py-3">
            <div class="container text-center">
                <span class="text-muted"
                    >&copy; 2026 App Clima - PABLO PERICÓ B.
                </span>
            </div>
        </footer>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="./js/main.js"></script>

</html>
